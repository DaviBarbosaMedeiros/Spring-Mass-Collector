site_name: Spring-Mass Collector
site_description: Open-source documentation for a low-cost data acquisition system for damped spring-mass experiments.
site_author: Davi Barbosa de Medeiros
site_url: https://davibarbosamedeiros.github.io/Spring-Mass-Collector/

repo_name: DaviBarbosaMedeiros/Springmass-Instructions
repo_url: https://github.com/DaviBarbosaMedeiros/Spring-Mass-Collector

copyright: Copyright &copy; 2026 Davi Barbosa de Medeiros

theme:
  name: material
  language: en

  logo: assets/LogoFismat.png
  favicon: assets/LogoFismatGraph.png

  font:
    text: Merriweather Sans
    code: Red Hat Mono

  palette:
    - scheme: default
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  icon:
    repo: fontawesome/brands/github

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    # - content.code.copy
    # - content.code.select
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes

  - pymdownx.details

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

  - pymdownx.inlinehilite

  - pymdownx.snippets

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.arithmatex:
      generic: true
      inline_syntax:
        - dollar
        - round
      block_syntax:
        - dollar
        - square
        - begin
      smart_dollar: true
  
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://davibarbosamedeiros.github.io/Spring-Mass-Collector/
      name: GitHub Repository

