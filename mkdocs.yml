site_name: Spring-Mass Colector Documentation
site_url: https://davispringmass.github.io
theme:
  logo: assets/LogoFismat.png
  favicon: assets/LogoFismatGraph.png
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  name: material
  palette: 

    # Palette toggle for light mode
    - scheme: default
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: white
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

        
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md

  - Project:
      - Introduction: introduction.md
      - Timeline: timeline.md
      - Budget: budget.md

  - Development:
      - Implemented: development/implemented.md
      - Finalization: development/finalization.md

  - Mechanical Design:
      - Initial Model: mechanical/initial-model.md
      - 3D Development: mechanical/3d-development.md
      - First Prototype: mechanical/prototype.md

  - Electronics:
      - Overview: electronics/overview.md
      - Sensor Test: electronics/sensor-test.md

  - Software:
      - Code Structure: software/code.md
      - Bluetooth: software/bluetooth.md
      - Components: software/components.md
      - Future Work: software/future-work.md